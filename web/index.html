<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <!-- IMPORTANT: Base href must be "/" for path-based routing to work correctly -->
  <!-- This removes the hash (#) from URLs -->
  <base href="/">

  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Bump build-version on each deploy to bust caches (or inject via CI) -->
  <meta name="build-version" content="v1.0.1">
  <meta name="description"
    content="Employee task management and time tracking application with modern UI and dark/light theme support.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Enable text selection and copying -->
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Webnox Sprintly Employee">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- Force CanvasKit renderer for consistent icon and shader rendering on live sites -->
  <script type="text/javascript">
    window.flutterWebRenderer = "canvaskit";
  </script>

  <title>Webnox Sprintly Employee</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">

  <!-- Theme color for browser UI -->
  <meta name="theme-color" content="#2563EB" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0E0E0E" media="(prefers-color-scheme: dark)">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #FFFFFF 0%, #F3F7FF 100%);
      --primary-color: #0F172A;
      --logo-shadow: rgba(15, 23, 42, 0.05);
      --border-color: rgba(148, 163, 184, 0.12);
      --logo-bg: #FFFFFF;
      --text-primary: #0F172A;
      --text-secondary: #475569;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-gradient: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
        --primary-color: #38BDF8;
        --logo-shadow: rgba(0, 0, 0, 0.25);
        --border-color: rgba(255, 255, 255, 0.08);
        --logo-bg: rgba(255, 255, 255, 0.05);
        --text-primary: #E2E8F0;
        --text-secondary: #94A3B8;
      }
    }
    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg-gradient);
      overflow: hidden;
    }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--bg-gradient);
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .loading-logo-wrapper {
      padding: 24px;
      background: var(--logo-bg);
      border-radius: 50%;
      border: 1px solid var(--border-color);
      box-shadow: 0 24px 48px var(--logo-shadow);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    /* Larger logo representation */
    .loading-logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      animation: logoPulse 2.5s infinite ease-in-out;
    }
    .brand-name {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 8px 0;
      letter-spacing: -0.5px;
      text-align: center;
    }
    .brand-subtitle {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      margin: 0 0 40px 0;
      text-align: center;
    }
    .loading-spinner-wrapper {
      width: 120px;
      height: 2px;
      background: var(--border-color);
      border-radius: 1px;
      overflow: hidden;
      position: relative;
    }
    .loading-spinner-bar {
      width: 60%;
      height: 100%;
      background: var(--primary-color);
      position: absolute;
      border-radius: 1px;
      animation: loadingBar 1.5s infinite ease-in-out;
    }
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes logoPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes loadingBar {
      0% { left: -60%; }
      50% { left: 100%; }
      100% { left: 100%; }
    }
  </style>
</head>

<body>
  <div id="loading">
    <div class="loading-container">
      <div class="loading-logo-wrapper">
        <img class="loading-logo" src="favicon.png" alt="Sprintly Logo">
      </div>
      <h1 class="brand-name">Rathz</h1>
      <h2 class="brand-subtitle">Employee Portal</h2>
      <div class="loading-spinner-wrapper">
        <div class="loading-spinner-bar"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/build/pdf.js" type="text/javascript"></script>
  <script type="text/javascript">
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/build/pdf.worker.min.js";
    pdfRenderOptions = {
      cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/cmaps/',
      cMapPacked: true,
    }
  </script>

  <!-- Enable text selection and keyboard shortcuts for Flutter web -->
  <script type="text/javascript">
    document.addEventListener('DOMContentLoaded', function () {
      // Enable text selection on the entire document
      document.body.style.userSelect = 'text';
      document.body.style.webkitUserSelect = 'text';
      document.body.style.mozUserSelect = 'text';
      document.body.style.msUserSelect = 'text';

      // Wait for Flutter to load and then enable text selection on canvas
      setTimeout(function () {
        const canvas = document.querySelector('canvas');
        if (canvas) {
          canvas.style.userSelect = 'text';
          canvas.style.webkitUserSelect = 'text';
          canvas.style.mozUserSelect = 'text';
          canvas.style.msUserSelect = 'text';
        }
      }, 1000);

      // Handle Ctrl+A (Select All) - Enhanced version
      document.addEventListener('keydown', function (e) {
        if (e.ctrlKey && e.key === 'a') {
          e.preventDefault();
          e.stopPropagation();

          // Try to select all text in the document
          if (window.getSelection) {
            const selection = window.getSelection();
            const range = document.createRange();

            // Try to select from the body first
            try {
              range.selectNodeContents(document.body);
              selection.removeAllRanges();
              selection.addRange(range);
            } catch (err) {
              // Fallback: try to select from the main content area
              const mainElement = document.getElementById('main') || document.body;
              range.selectNodeContents(mainElement);
              selection.removeAllRanges();
              selection.addRange(range);
            }
          }
        }
      });

      // Handle Ctrl+C (Copy) - Enhanced
      document.addEventListener('keydown', function (e) {
        if (e.ctrlKey && e.key === 'c') {
          // Let the default copy behavior work
          return true;
        }
      });

      // Handle Ctrl+V (Paste) - for input fields
      document.addEventListener('keydown', function (e) {
        if (e.ctrlKey && e.key === 'v') {
          // Let the default paste behavior work
          return true;
        }
      });

      // Enable right-click context menu
      document.addEventListener('contextmenu', function (e) {
        // Allow default context menu
        return true;
      });

      // Prevent default drag behavior that might interfere with text selection
      document.addEventListener('dragstart', function (e) {
        if (e.target.tagName !== 'IMG') {
          e.preventDefault();
        }
      });

      // Add mouse event listeners for better text selection
      document.addEventListener('mousedown', function (e) {
        // Allow text selection on mouse down
        if (e.target.tagName === 'CANVAS' || e.target.tagName === 'BODY') {
          e.target.style.userSelect = 'text';
        }
      });

      // Enable text selection on double-click
      document.addEventListener('dblclick', function (e) {
        if (window.getSelection) {
          const selection = window.getSelection();
          if (selection.toString().length === 0) {
            // If no text is selected, try to select the word under cursor
            const range = document.createRange();
            range.selectNodeContents(document.body);
            selection.removeAllRanges();
            selection.addRange(range);
          }
        }
      });
    });
  </script>

  <script>
    // Remove loading overlay once Flutter starts rendering canvas
    const observer = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
          if (node.tagName === 'FLUTTER-VIEW' || node.tagName === 'CANVAS') {
            const loader = document.getElementById('loading');
            if (loader) {
              loader.style.opacity = '0';
              setTimeout(() => loader.remove(), 500);
            }
            observer.disconnect();
            return;
          }
        }
      }
    });
    observer.observe(document.body, { childList: true });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
