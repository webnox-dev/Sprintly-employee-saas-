<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <!-- IMPORTANT: Base href must be "/" for path-based routing to work correctly -->
  <!-- This removes the hash (#) from URLs -->
  <base href="/">

  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Bump build-version on each deploy to bust caches (or inject via CI) -->
  <meta name="build-version" content="v1.0.1">
  <meta name="description"
    content="Employee task management and time tracking application with modern UI and dark/light theme support.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Enable text selection and copying -->
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Webnox Sprintly Employee">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- Force CanvasKit renderer for consistent icon and shader rendering on live sites -->
  <script type="text/javascript">
    window.flutterWebRenderer = "canvaskit";
  </script>

  <title>Webnox Sprintly Employee</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">

  <!-- Theme color for browser UI -->
  <meta name="theme-color" content="#2563EB" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0E0E0E" media="(prefers-color-scheme: dark)">

  <style>
    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #FFFFFF 0%, #F3F7FF 100%);
      overflow: hidden;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      }
    }
  </style>
</head>

<body>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/build/pdf.js" type="text/javascript"></script>
  <script type="text/javascript">
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/build/pdf.worker.min.js";
    pdfRenderOptions = {
      cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/cmaps/',
      cMapPacked: true,
    }
  </script>

  <!-- Enable text selection and keyboard shortcuts for Flutter web -->
  <script type="text/javascript">
    document.addEventListener('DOMContentLoaded', function () {
      // Enable text selection on the entire document
      document.body.style.userSelect = 'text';
      document.body.style.webkitUserSelect = 'text';
      document.body.style.mozUserSelect = 'text';
      document.body.style.msUserSelect = 'text';

      // Wait for Flutter to load and then enable text selection on canvas
      setTimeout(function () {
        const canvas = document.querySelector('canvas');
        if (canvas) {
          canvas.style.userSelect = 'text';
          canvas.style.webkitUserSelect = 'text';
          canvas.style.mozUserSelect = 'text';
          canvas.style.msUserSelect = 'text';
        }
      }, 1000);

      // Handle Ctrl+A (Select All) - Enhanced version
      document.addEventListener('keydown', function (e) {
        if (e.ctrlKey && e.key === 'a') {
          e.preventDefault();
          e.stopPropagation();

          // Try to select all text in the document
          if (window.getSelection) {
            const selection = window.getSelection();
            const range = document.createRange();

            // Try to select from the body first
            try {
              range.selectNodeContents(document.body);
              selection.removeAllRanges();
              selection.addRange(range);
            } catch (err) {
              // Fallback: try to select from the main content area
              const mainElement = document.getElementById('main') || document.body;
              range.selectNodeContents(mainElement);
              selection.removeAllRanges();
              selection.addRange(range);
            }
          }
        }
      });

      // Handle Ctrl+C (Copy) - Enhanced
      document.addEventListener('keydown', function (e) {
        if (e.ctrlKey && e.key === 'c') {
          // Let the default copy behavior work
          return true;
        }
      });

      // Handle Ctrl+V (Paste) - for input fields
      document.addEventListener('keydown', function (e) {
        if (e.ctrlKey && e.key === 'v') {
          // Let the default paste behavior work
          return true;
        }
      });

      // Enable right-click context menu
      document.addEventListener('contextmenu', function (e) {
        // Allow default context menu
        return true;
      });

      // Prevent default drag behavior that might interfere with text selection
      document.addEventListener('dragstart', function (e) {
        if (e.target.tagName !== 'IMG') {
          e.preventDefault();
        }
      });

      // Add mouse event listeners for better text selection
      document.addEventListener('mousedown', function (e) {
        // Allow text selection on mouse down
        if (e.target.tagName === 'CANVAS' || e.target.tagName === 'BODY') {
          e.target.style.userSelect = 'text';
        }
      });

      // Enable text selection on double-click
      document.addEventListener('dblclick', function (e) {
        if (window.getSelection) {
          const selection = window.getSelection();
          if (selection.toString().length === 0) {
            // If no text is selected, try to select the word under cursor
            const range = document.createRange();
            range.selectNodeContents(document.body);
            selection.removeAllRanges();
            selection.addRange(range);
          }
        }
      });
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
